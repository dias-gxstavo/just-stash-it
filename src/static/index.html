<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>just stash it — minimalist text sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&family=Manrope:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/output.css"/>
</head>
<body class="font-body-md bg-background text-on-background min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">

    <header class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md border-b border-neutral-100/10">
        <div class="max-w-[1200px] mx-auto px-8 flex justify-between items-center h-20">
           <div class="text-2xl font-semibold italic text-neutral-50 font-headline-md tracking-tight">
                <a href="index.html">
                    just stash it
                </a>
            </div>
            <nav class="hidden md:flex items-center gap-8 font-newsreader tracking-tight">
                <a class="text-neutral-400 hover:text-neutral-50 transition-colors duration-300" href="#" target="_blank">API</a>
                <a class="text-neutral-50 border-b border-coral-400 pb-1 hover:text-neutral-50 transition-colors duration-300" target="_blank" href="https://github.com/dias-gxstavo/just-stash-it">Source</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-32 px-8">
        <div class="max-w-[1200px] mx-auto">

            <div class="mb-16">
                <h1 class="font-display text-display text-on-surface-variant max-w-3xl">
                    Share. Security. <br/><span class="italic text-primary-fixed-dim">Ephemeral.</span>
                </h1>
            </div>

            <section class="space-y-8">

                <input
                    id="content-name"
                    type="text"
                    placeholder="Title (e.g compose.yml, style.css)"
                    class="w-full bg-surface-container-low border border-neutral-100/10 rounded-lg px-8 py-4 text-body-lg font-body-lg text-on-surface outline-none focus:border-primary-fixed-dim transition-colors duration-300 placeholder:text-on-surface-variant/40"
                />

                <div class="w-full h-[500px] bg-surface-container-low border border-neutral-100/10 rounded-lg overflow-hidden focus-within:border-primary-fixed-dim transition-colors duration-500">
                    <textarea
                        id="content-body"
                        class="w-full h-full bg-transparent p-12 text-body-lg font-body-lg text-on-surface outline-none resize-none textarea-custom"
                        placeholder="Paste your text here..."
                    ></textarea>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 py-8 border-b border-neutral-100/10">
                    <div class="flex flex-wrap gap-4">
                        <div class="group relative">
                            <label class="block font-label-sm text-on-surface-variant mb-2 opacity-60">Expiration</label>
                            <select id="expiration" class="appearance-none bg-surface-container-high border border-neutral-100/10 text-on-surface font-body-md px-6 py-3 rounded-lg pr-12 focus:border-primary focus:ring-0 cursor-pointer">
                                <option>5 min</option>
                                <option>10 min</option>
                                <option>1 hour</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-4 bottom-3.5 pointer-events-none text-on-surface-variant">schedule</span>
                        </div>
                    </div>

                    <div class="flex flex-col items-end gap-4">
                        <button id="generate-btn" class="bg-primary-container text-on-primary-container font-body-lg font-semibold px-12 py-4 rounded-lg hover:brightness-110 active:opacity-80 transition-all duration-300">
                            Generate Link
                        </button>
                        <p class="font-body-md text-on-surface-variant opacity-60 italic">
                            Paste your text and share instantly.
                        </p>
                    </div>
                </div>

                <div id="generated-link-container" class="hidden flex items-center gap-4 p-6 bg-surface-container-low border border-neutral-100/10 rounded-lg">
                    <a id="generated-link" href="#" target="_blank" class="flex-1 text-primary-fixed-dim font-body-md break-all hover:underline"></a>
                    <button id="copy-btn" class="bg-surface-container-high border border-outline-variant px-4 py-2 font-label-sm text-label-sm uppercase hover:bg-primary-container hover:text-on-primary-container transition-all duration-300">
                        Copy
                    </button>
                </div>

            </section>

            <section class="mt-section-gap grid grid-cols-1 md:grid-cols-2 gap-gutter">
                <div class="p-8 bg-surface-container border border-neutral-100/10 rounded-xl space-y-4">
                    <span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">security</span>
                    <h3 class="font-headline-md text-headline-md text-on-surface">Private by Default</h3>
                    <p class="font-body-md text-on-surface-variant opacity-80">Automatic deletion policies protect your shared content.</p>
                </div>
                <div class="p-8 bg-surface-container border border-neutral-100/10 rounded-xl space-y-4">
                    <span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">code</span>
                    <h3 class="font-headline-md text-headline-md text-on-surface">Simple API</h3>
                    <p class="font-body-md text-on-surface-variant opacity-80">Check <span class="text-lg font-bold text-neutral-50 font-headline-md italic"> <a href="#">/docs</a> </span> to know how to use our API</p>
                </div>
            </section>

        </div>
    </main>

    <footer class="w-full py-20 mt-32 bg-neutral-950 border-t border-neutral-100/10">
        <div class="max-w-[1200px] mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex flex-col gap-2">
                <div class="text-lg font-bold text-neutral-50 font-headline-md italic">just stash it</div>
                <div class="font-newsreader text-sm uppercase tracking-widest text-neutral-500">@ <span id="current-year"></span></div>
            </div>
            <div class="flex gap-12 font-newsreader text-sm uppercase tracking-widest">
                <a class="text-neutral-500 hover:text-coral-400 transition-colors" href="#" target="_blank">API</a>
                <a class="text-neutral-500 hover:text-coral-400 transition-colors" href="#"target="_blank">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="js/index.js"></script>
    <script src="js/modal.js"></script>
</body>
</html>
