<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>just stash it — minimalist text sharing</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&family=Manrope:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/output.css" />
</head>

<body
    class="font-body-md bg-background text-on-background min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">

    <header class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md border-b border-neutral-100/10">
        <div class="max-w-[1200px] mx-auto px-8 flex justify-between items-center h-20">
            <div class="text-2xl font-semibold italic text-neutral-50 font-headline-md tracking-tight">
                <a href="/index.html">
                    just stash it
                </a>
            </div>
            <nav class="hidden md:flex items-center gap-8 font-newsreader tracking-tight">
                <a class="text-neutral-400 hover:text-neutral-50 transition-colors duration-300 docs-link" href="#" target="_blank">API</a>
                <a class="text-neutral-50 border-b border-coral-400 pb-1 hover:text-neutral-50 transition-colors duration-300"
                    target="_blank" href="https://github.com/dias-gxstavo/just-stash-it">Source</a>
            </nav>
        </div>
    </header>

    <main class="min-h-screen pt-20 flex items-center justify-center relative overflow-hidden">
        <div
            class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
        </div>
        <section
            class="max-w-[1200px] mx-auto px-8 w-full flex flex-col md:flex-row items-center justify-between gap-16 relative z-10">
            <div class="flex-1 text-center md:text-left">
                <div class="mb-4 inline-block px-3 py-1 border border-outline-variant rounded-full">
                    <span class="text-label-sm font-label-sm text-outline uppercase tracking-widest">Error Code </span>
                </div>
                <h1 class="font-display text-display text-on-surface mb-6 italic">
                    404 - Not Found
                </h1>
                <p class="font-headline-md text-headline-md text-on-surface-variant max-w-lg mb-12 opacity-80">
                    The content you are looking for has vanished into the darkness.
                </p>
                <div class="flex flex-col sm:flex-row gap-6 justify-center md:justify-start">
                    <a class="bg-primary-container text-on-primary-container font-body-lg font-semibold px-12 py-4 rounded-lg hover:brightness-110 active:opacity-80 transition-all duration-300"
                        href="/index.html">
                        Return to Home
                    </a>

                </div>
            </div>
            <div class="flex-1 w-full max-w-md md:max-w-none">
                <div class="relative group">
                    <div
                        class="absolute -inset-4 border border-outline-variant opacity-20 pointer-events-none transition-all duration-700 group-hover:scale-105">
                    </div>
                    <div class="aspect-[4/5] bg-surface-container-high overflow-hidden relative">
                        <img alt="Mysterious Archive"
                            class="w-full h-full object-cover grayscale opacity-60 mix-blend-luminosity"
                            data-alt="A moody, high-contrast black and white photograph of a dark, minimalist library or archive room. Narrow shafts of soft, ethereal light pierce through the shadows, illuminating floating dust motes and rows of neatly bound, dark portfolios. The scene evokes a sense of quiet luxury, intellectual mystery, and sophisticated solitude, perfectly aligned with a premium editorial noir aesthetic."
                            src="https://64.media.tumblr.com/371ea1c34e8b1da338dc44d1cd9c8eb5/tumblr_oylq28HXg91qciqqno1_540.gif">
                        <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent">
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="w-full py-20 mt-32 bg-neutral-950 border-t border-neutral-100/10">
        <div class="max-w-[1200px] mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex flex-col gap-2">
                <div class="text-lg font-bold text-neutral-50 font-headline-md italic">just stash it</div>
                <div class="font-newsreader text-sm uppercase tracking-widest text-neutral-500">@ <span id="current-year"></span></div>
            </div>
            <div class="flex gap-12 font-newsreader text-sm uppercase tracking-widest">
                <a class="text-neutral-500 hover:text-coral-400 transition-colors docs-link" href="#" target="_blank">API</a>
                <a class="text-neutral-500 hover:text-coral-400 transition-colors" href="https://github.com/dias-gxstavo/just-stash-it" target="_blank">GitHub</a>
            </div>
        </div>
    </footer>
    <script src="/js/config.js"></script>
</body>
</html>
