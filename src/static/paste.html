<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">

    <header class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md border-b border-neutral-100/10">
        <div class="max-w-[1200px] mx-auto px-8 flex justify-between items-center h-20">
            <div class="text-2xl font-semibold italic text-neutral-50 font-headline-md tracking-tight">
                <a href="index.html">
                    just stash it
                </a>
            </div>
            <nav class="hidden md:flex items-center gap-8 font-newsreader tracking-tight">
                <a class="text-neutral-400 hover:text-neutral-50 transition-colors duration-300" href="#">API</a>
                <a class="text-neutral-50 border-b border-coral-400 pb-1 hover:text-neutral-50 transition-colors duration-300" href="#">Editor</a>
            </nav>
        </div>
    </header>

    <main class="pt-32 pb-20 max-w-[1200px] mx-auto px-8">

        <div class="mb-12">
            <h1 id="content-name" class="font-headline-lg text-headline-lg text-on-surface mb-2">Loading...</h1>
            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">
                Created <span id="created-at">—</span>
            </p>
            <p id="error-message" class="hidden mt-4 text-error font-body-md"></p>
        </div>

        <div class="relative group">

            <div class="absolute top-6 right-6 z-10 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <button id="copy-btn" class="bg-surface-container-high border border-outline-variant px-4 py-2 flex items-center gap-2 hover:bg-primary-container hover:text-on-primary-container transition-all duration-300">
                    <span class="material-symbols-outlined text-[18px]">content_copy</span>
                    <span class="label font-label-sm text-label-sm uppercase">Copy all</span>
                </button>
                <button id="share-btn" class="bg-surface-container-high border border-outline-variant px-4 py-2 flex items-center gap-2 hover:bg-primary-container hover:text-on-primary-container transition-all duration-300">
                    <span class="material-symbols-outlined text-[18px]">share</span>
                </button>
            </div>

            <div class="bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden">
                <div class="flex items-center gap-2 px-6 py-4 bg-surface-container-low border-b border-outline-variant">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-outline-variant"></div>
                        <div class="w-3 h-3 rounded-full bg-outline-variant"></div>
                        <div class="w-3 h-3 rounded-full bg-outline-variant"></div>
                    </div>
                    <span class="ml-4 font-label-sm text-label-sm text-on-surface-variant">paste</span>
                </div>
                <div class="p-8 overflow-x-auto">
                    <pre class="font-mono text-body-md leading-relaxed"><code id="content-body" class="block text-on-surface whitespace-pre-wrap"></code></pre>
                </div>
            </div>

        </div>
    </main>

    <footer class="w-full py-20 mt-32 bg-neutral-950 border-t border-neutral-100/10">
        <div class="max-w-[1200px] mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex flex-col gap-2">
                <div class="text-lg font-bold text-neutral-50 font-headline-md italic">just stash it</div>
                <div class="font-newsreader text-sm uppercase tracking-widest text-neutral-500">@ <span id="current-year"></span></div>
            </div>
            <div class="flex gap-12 font-newsreader text-sm uppercase tracking-widest">
                <a class="text-neutral-500 hover:text-coral-400 transition-colors" href="#">API</a>
                <a class="text-neutral-500 hover:text-coral-400 transition-colors" href="#">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="js/paste.js"></script>
    <script src="js/modal.js"></script>
</body>
</html>
