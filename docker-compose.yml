version: "3.8"

services:
  redis:
    container_name: textbin_redis
    image: redis:8.4.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - textbin
  api:
    container_name: textbin_api
    image: textbin-app:latest
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - textbin
    depends_on:
      - redis

  frontend:
    container_name: textbin-frontend
    build:
      context: .
      dockerfile: nginx/nginx.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - textbin
    volumes:
      - ./src/static:/usr/share/nginx/html

networks:
  textbin:
    driver: bridge